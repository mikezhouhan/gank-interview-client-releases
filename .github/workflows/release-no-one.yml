name: NO ONE Build and Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: true
        default: 'v0.0.1'
      branch:
        description: 'Branch to checkout from private repository (e.g., dev, main)'
        required: true
        default: 'dev'
        
  push:
    tags:
      - v*.*.*

permissions:
  contents: write

jobs:
  release:
    runs-on: ${{ matrix.os }}
    environment: default
    strategy:
      matrix:
        include:
          - os: macos-15-intel  # Intel x64 runner on macOS 15
            platform: mac-x64
          - os: macos-latest    # ARM64 runner for arm64 build
            platform: mac-arm64
          - os: windows-latest
            platform: windows
      fail-fast: false

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4
        with:
          repository: mikezhouhan/Gank-Interview
          token: ${{ secrets.PRIVATE_REPO_ACCESS_TOKEN }}
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.branch || github.ref }}
          persist-credentials: true
          clean: true
          sparse-checkout-cone-mode: true
          fetch-depth: 1
          fetch-tags: true
          show-progress: true
          lfs: false
          submodules: false
          set-safe-directory: true

      - name: Print Cloned Commit ID
        shell: bash
        run: |
          echo "Cloned commit ID from private repository (mikezhouhan/Gank-Interview):"
          git rev-parse HEAD

      - name: Get release tag
        id: get-tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 23

      - name: Get npm cache directory path
        id: npm-cache-dir-path
        run: echo "dir=$(npm config get cache)" >> $GITHUB_OUTPUT

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: |
            ${{ steps.npm-cache-dir-path.outputs.dir }}
            node_modules
          key: ${{ runner.os }}-${{ matrix.platform }}-npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.platform }}-npm-

      - name: Install Dependencies
        run: npm install --legacy-peer-deps # Added --legacy-peer-deps based on common Electron/Vite project needs, remove if not necessary
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Replace package.json values for stealth build
        shell: bash
        run: |
          # Use Node.js to modify package.json
          node -e "
          const fs = require('fs');
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          pkg.name = 'Desktophelper';
          // Replace productName
          pkg.build.productName = 'Desktophelper';

          // Replace Mac icon
          pkg.build.mac.icon = 'assets/icons/mac/blank.icns';

          // Replace Windows icon
          pkg.build.win.icon = 'assets/icons/win/blank.ico';

          // Write the modified package.json
          fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          console.log('✅ package.json modified for stealth build');
          "

      - name: Configure Mac build architecture
        if: matrix.platform == 'mac-x64' || matrix.platform == 'mac-arm64'
        shell: bash
        run: |
          if [ "${{ matrix.platform }}" = "mac-x64" ]; then
            echo "Configuring build for x64 only..."
            node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('package.json'));p.build.mac.target=[{target:'dmg',arch:['x64']},{target:'zip',arch:['x64']}];fs.writeFileSync('package.json',JSON.stringify(p,null,2));"
          else
            echo "Configuring build for arm64 only..."
            node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('package.json'));p.build.mac.target=[{target:'dmg',arch:['arm64']},{target:'zip',arch:['arm64']}];fs.writeFileSync('package.json',JSON.stringify(p,null,2));"
          fi

      - name: Build Mac
        if: matrix.platform == 'mac-x64' || matrix.platform == 'mac-arm64'
        run: npm run package-mac -- --publish=never
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Submit app for notarization
        if: matrix.platform == 'mac-x64' || matrix.platform == 'mac-arm64'
        shell: bash
        run: |
          if [ "${{ matrix.platform }}" = "mac-x64" ]; then
            DMG_FILE="release/Desktophelper-*-x64.dmg"
          else
            DMG_FILE="release/Desktophelper-*-arm64.dmg"
          fi
          SUBMISSION_OUTPUT=$(xcrun notarytool submit --force $DMG_FILE --apple-id "${{ secrets.APPLE_ID }}" --password "${{ secrets.APPLE_PASSWORD }}" --team-id "${{ secrets.APPLE_TEAM_ID }}")
          echo "$SUBMISSION_OUTPUT"
          SUBMISSION_ID=$(echo "$SUBMISSION_OUTPUT" | grep "id:" | head -1 | awk '{print $2}')
          echo "SUBMISSION_ID=$SUBMISSION_ID" >> $GITHUB_ENV

      - name: Check notarization status
        if: matrix.platform == 'mac-x64' || matrix.platform == 'mac-arm64'
        shell: bash
        run: |
          MAX_ATTEMPTS=10
          ATTEMPT=1
          for i in $(seq 1 $MAX_ATTEMPTS); do
            STATUS_OUTPUT=$(xcrun notarytool info $SUBMISSION_ID --apple-id "${{ secrets.APPLE_ID }}" --password "${{ secrets.APPLE_PASSWORD }}" --team-id "${{ secrets.APPLE_TEAM_ID }}")
            echo "$STATUS_OUTPUT"
            STATUS=$(echo "$STATUS_OUTPUT" | grep "status:" | sed 's/status: //' | xargs)
            if [ "$STATUS" = "Accepted" ]; then
              echo "Notarization succeeded for ${{ matrix.platform }}!"
              break
            elif [ "$STATUS" = "In Progress" ]; then
              echo "Notarization in progress, retrying in 600 seconds..."
              sleep 600
              ATTEMPT=$((ATTEMPT + 1))
            else
              echo "Notarization failed with status: $STATUS"
              exit 1
            fi
            if [ $ATTEMPT -eq $MAX_ATTEMPTS ]; then
              echo "Max attempts reached, notarization still in progress."
              exit 1
            fi
          done

      - name: Build Windows
        if: matrix.platform == 'windows'
        run: npm run package-win -- --publish=never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release Mac
        if: matrix.platform == 'mac-x64' || matrix.platform == 'mac-arm64'
        uses: ncipollo/release-action@v1
        with:
          draft: true
          allowUpdates: true
          makeLatest: false
          tag: ${{ steps.get-tag.outputs.tag }}
          artifacts: 'release/*.dmg,release/*.zip'
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Release Windows
        if: matrix.platform == 'windows'
        uses: ncipollo/release-action@v1
        with:
          draft: true
          allowUpdates: true
          makeLatest: false
          tag: ${{ steps.get-tag.outputs.tag }}
          artifacts: 'release/*.exe,release/latest.yml'
          token: ${{ secrets.GITHUB_TOKEN }}

  merge-mac-latest:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
    steps:
      - name: Download mac release assets
        run: |
          mkdir -p release-assets
          gh release download "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern '*-arm64.zip' \
            --pattern '*-x64.zip' \
            --pattern '*-arm64.dmg' \
            --pattern '*-x64.dmg' \
            --dir release-assets \
            --clobber

      - name: Generate merged latest-mac.yml
        run: |
          python3 - <<'PY'
          from pathlib import Path
          from datetime import datetime, timezone
          import base64
          import hashlib
          import os

          release_dir = Path("release-assets")
          version = os.environ["TAG"].lstrip("v")

          def sha512_base64(path: Path) -> str:
              digest = hashlib.sha512()
              with path.open("rb") as file:
                  for chunk in iter(lambda: file.read(1024 * 1024), b""):
                      digest.update(chunk)
              return base64.b64encode(digest.digest()).decode("ascii")

          files = []
          for pattern in ("*-arm64.zip", "*-x64.zip", "*-arm64.dmg", "*-x64.dmg"):
              for path in sorted(release_dir.glob(pattern)):
                  files.append({
                      "url": path.name,
                      "sha512": sha512_base64(path),
                      "size": path.stat().st_size,
                  })

          if not any(item["url"].endswith("-arm64.zip") for item in files):
              raise SystemExit("missing arm64 zip")
          if not any(item["url"].endswith("-x64.zip") for item in files):
              raise SystemExit("missing x64 zip")

          fallback = next(item for item in files if item["url"].endswith("-x64.zip"))
          release_date = datetime.now(timezone.utc).isoformat(timespec="milliseconds").replace("+00:00", "Z")

          lines = [f"version: {version}", "files:"]
          for item in files:
              lines.extend([
                  f"  - url: {item['url']}",
                  f"    sha512: {item['sha512']}",
                  f"    size: {item['size']}",
              ])
          lines.extend([
              f"path: {fallback['url']}",
              f"sha512: {fallback['sha512']}",
              f"releaseDate: '{release_date}'",
              "",
          ])

          output = release_dir / "latest-mac.yml"
          output.write_text("\n".join(lines), encoding="utf-8")
          print(output.read_text())
          PY

      - name: Upload merged latest-mac.yml
        run: gh release upload "$TAG" release-assets/latest-mac.yml --repo "$GITHUB_REPOSITORY" --clobber
